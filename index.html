<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수수료 지급명세서 - 주식회사 아이야</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --g1:#1B3A2D; --g2:#2D6A4F; --g3:#40916C; --g4:#95D5B2;
  --bh:#BDD7EE; --bc:#DEEAF1; --peach:#FCE4D6;
  --bd:#8DB4C0; --bg:#F0F7F2; --surface:#fff;
  --text:#1B2E1A; --muted:#4A6E47;
  --ok:#3A6B35; --err:#C0392B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* TOP */
.top-bar{background:var(--g1);color:#fff;padding:11px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.22);}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo-img{height:38px;object-fit:contain;background:#fff;border-radius:6px;padding:3px 8px;}
.logo-text h1{font-size:16px;font-weight:700;}
.logo-text p{font-size:11px;color:#b2d9ab;margin-top:1px;}
.badge{background:var(--g3);color:#fff;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;}

/* LAYOUT */
.app{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 62px);}

/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid #C8DFC8;padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
.sb-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.upload-zone{border:2px dashed #A8C8A0;border-radius:10px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;background:#F5FAF5;position:relative;}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--g1);background:#E8F5E8;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-icon{font-size:28px;margin-bottom:5px;}
.upload-zone p{font-size:12px;color:var(--muted);line-height:1.6;}
.upload-zone strong{color:var(--g1);}
.tpl-btn{width:100%;padding:9px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;}
.tpl-btn:hover{opacity:.9;}
.meta-box{background:#F5FAF5;border:1px solid #C8DFC8;border-radius:8px;padding:10px 12px;font-size:12px;display:flex;flex-direction:column;gap:5px;}
.meta-row{display:flex;justify-content:space-between;}
.meta-row .mk{color:var(--muted);font-weight:600;}
.meta-row .mv{font-weight:600;color:var(--g1);}
.emp-list{display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex:1;max-height:360px;}
.emp-item{padding:8px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px;}
.emp-item:hover{background:#F0F7F0;border-color:#C8DFC8;}
.emp-item.active{background:#E0F0DC;border-color:var(--g2);}
.emp-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.emp-info p{font-size:12px;font-weight:600;}
.emp-info span{font-size:10px;color:var(--muted);}
.send-all-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;box-shadow:0 3px 10px rgba(58,107,53,.3);font-family:inherit;}
.send-all-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(58,107,53,.4);}
.send-all-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* MAIN */
.main{padding:24px;overflow-y:auto;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;text-align:center;gap:14px;}
.empty-state .big-icon{font-size:70px;opacity:.25;}
.empty-state h2{font-size:20px;color:var(--muted);font-weight:600;}
.empty-state p{color:var(--muted);font-size:13px;max-width:300px;line-height:1.7;}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;justify-content:center;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#E0F0DC;color:var(--g1);}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;max-width:700px;margin-left:auto;margin-right:auto;}
.toolbar h2{flex:1;font-size:17px;font-weight:700;}
.btn{padding:8px 16px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s;font-family:inherit;}
.btn-outline{background:#fff;color:var(--text);border:1px solid #C8DFC8;}
.btn-outline:hover{border-color:var(--g1);color:var(--g1);}
.btn-green{background:var(--g1);color:#fff;box-shadow:0 2px 8px rgba(58,107,53,.25);}
.btn-green:hover{background:var(--g2);}

/* ── SLIP ── */
.slip-wrap{max-width:700px;margin:0 auto;}
.slip{background:#fff;border:1.5px solid var(--bd);border-radius:4px;overflow:hidden;box-shadow:0 3px 18px rgba(0,0,0,.07);font-size:12.5px;}
.slip-title{background:var(--g1);color:#fff;text-align:center;padding:12px 0;font-size:17px;font-weight:700;letter-spacing:1px;}
.slip table{width:100%;border-collapse:collapse;}
.slip td{border:1px solid var(--bd);padding:6px 10px;vertical-align:middle;}
.lbl{background:var(--bc);font-weight:600;text-align:center;white-space:nowrap;font-size:12px;width:90px;}
.val{min-width:100px;}
.sec-hd{background:var(--bh);font-weight:700;text-align:center;font-size:13px;}
.tot-lbl{background:var(--peach);font-weight:700;text-align:center;}
.tot-val{background:var(--peach);font-weight:700;}
.net-lbl{background:var(--bc);font-weight:700;text-align:center;}
.net-val{font-weight:700;font-size:15px;color:var(--g1);}
.memo-td{height:52px;vertical-align:top;font-size:12px;color:#555;padding:8px 10px;}
.gap{height:7px;background:#f9f9f9;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);}
.slip-footer{padding:9px 16px;background:#F5FAF5;border-top:1px solid #C8DFC8;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);}
.slip-footer img{height:20px;object-fit:contain;opacity:.6;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:14px;padding:26px;width:480px;max-width:92vw;transform:scale(.95);transition:transform .2s;box-shadow:0 16px 50px rgba(0,0,0,.18);}
.modal-overlay.open .modal{transform:scale(1);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.fg{margin-bottom:13px;}
.fg label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
.fg input,.fg textarea{width:100%;padding:8px 11px;border:1px solid #C8DFC8;border-radius:7px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.fg input:focus,.fg textarea:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(58,107,53,.1);}
.fg textarea{height:70px;resize:none;}
.modal-note{background:#F5FAF5;border-radius:7px;padding:9px;font-size:11px;color:var(--muted);margin-top:3px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-actions .btn{flex:1;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:200;padding:11px 17px;border-radius:9px;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;transform:translateX(120%);transition:transform .3s ease;box-shadow:0 4px 18px rgba(0,0,0,.18);}
.toast.show{transform:translateX(0);}
.toast.success{background:var(--ok);}
.toast.error{background:var(--err);}

.pb{height:3px;background:#C8DFC8;border-radius:2px;overflow:hidden;margin-top:6px;}
.pf{height:100%;background:var(--g1);border-radius:2px;transition:width .3s;}

@media print{
  .top-bar,.sidebar,.toolbar{display:none!important;}
  .app{grid-template-columns:1fr;}
  .main{padding:0;}
  .slip{box-shadow:none;}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-wrap">
    <img class="logo-img" id="topLogo" src="" alt="iyah enc">
    <div class="logo-text">
      <h1>주식회사 아이야</h1>
      <p>수수료 지급명세서 자동화 시스템</p>
    </div>
  </div>
  <span class="badge">iyah enc</span>
</div>

<div class="app">
  <div class="sidebar">
    <div>
      <div class="sb-title">📁 파일 업로드</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this)">
        <div class="upload-icon">📊</div>
        <p><strong>클릭 또는 드래그</strong><br>강사 수수료 지급내역 .xlsx</p>
      </div>
      <div id="uploadProgress" style="display:none;margin-top:6px;">
        <div style="font-size:11px;color:var(--muted)">파싱 중...</div>
        <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
      </div>
    </div>

    <div id="metaBox" style="display:none">
      <div class="sb-title">📋 파일 정보</div>
      <div class="meta-box">
        <div class="meta-row"><span class="mk">지급일</span><span class="mv" id="metaDate">-</span></div>
        <div class="meta-row"><span class="mk">수업기간</span><span class="mv" id="metaPeriod">-</span></div>
        <div class="meta-row"><span class="mk">강사구분</span><span class="mv" id="metaType">-</span></div>
        <div class="meta-row"><span class="mk">인원</span><span class="mv" id="metaCount">-</span></div>
      </div>
    </div>

    <div style="flex:1">
      <div class="sb-title">👥 강사 목록 <span id="empCount" style="color:var(--g1)"></span></div>
      <div class="emp-list" id="empList">
        <div style="text-align:center;color:var(--muted);font-size:12px;padding:18px 0;">파일을 업로드하면<br>목록이 표시됩니다</div>
      </div>
    </div>

    <button class="send-all-btn" id="sendAllBtn" onclick="sendAll()" disabled>✉ 전체 일괄 이메일 전송</button>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-state">
      <div class="big-icon">🦒</div>
      <h2>수수료 지급명세서</h2>
      <p>강사 수수료 지급내역 엑셀 파일을 업로드하면 명세서가 자동 생성됩니다.</p>
      <div class="chips">
        <span class="chip">✓ 엑셀 자동 파싱</span>
        <span class="chip">✓ 양식 그대로 생성</span>
        <span class="chip">✓ PDF 출력</span>
        <span class="chip">✓ 이메일 전송</span>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="emailModal">
  <div class="modal">
    <h3>✉ 수수료 지급명세서 이메일 전송</h3>
    <div class="fg"><label>받는 사람 (이메일)</label><input type="email" id="emailTo"></div>
    <div class="fg"><label>이름</label><input type="text" id="emailName"></div>
    <div class="fg"><label>제목</label><input type="text" id="emailSubject"></div>
    <div class="fg"><label>메모 (선택)</label><textarea id="emailBody"></textarea></div>
    <div class="modal-note">📧 네이버 메일을 통해 실제 이메일이 전송됩니다.</div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-green" onclick="sendEmail()">✉ 전송</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

window.addEventListener('DOMContentLoaded', () => { document.getElementById('topLogo').src = LOGO_SRC; });

let employees = [], currentEmp = null, fileMeta = {};

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files[0]) parseExcel(e.dataTransfer.files[0]); });
function handleFile(i) { if (i.files[0]) parseExcel(i.files[0]); }

function parseExcel(file) {
  document.getElementById('uploadProgress').style.display = 'block';
  animProg();
  const r = new FileReader();
  r.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      // Row 0: metadata
      const row0 = raw[0] || [];
      let payDate = '';
      // col 12 = 지급일 value
      if (row0[12]) {
        const d = row0[12];
        if (d instanceof Date) payDate = d.toISOString().slice(0,10);
        else payDate = String(d).slice(0,10);
      }
      const classPeriod = row0[16] ? String(row0[16]) : '';
      const instrType   = row0[19] ? String(row0[19]) : '';

      fileMeta = { payDate, classPeriod, instrType };

      // Rows from index 3 = data
      employees = [];
      for (let i = 3; i < raw.length; i++) {
        const row = raw[i];
        const no = row[0];
        if (!no || String(no) === '총계' || String(no).trim() === '') continue;
        const toNum = v => (v === '' || v === null || v === undefined) ? 0 : (isNaN(Number(v)) ? 0 : Number(v));
        employees.push({
          no:           String(row[0]),
          school:       String(row[1]||''),
          type:         String(row[2]||''),
          subject:      String(row[3]||''),
          monthly_fee:  toNum(row[4]),
          name:         String(row[5]||''),
          headcount:    toNum(row[6]),
          fee_sales:    toNum(row[7]),
          class_count:  String(row[8]||''),
          fee_per:      toNum(row[9]),
          fee_total:    toNum(row[10]),
          deduct_total: toNum(row[11]),
          net_pay:      toNum(row[12]),
          bank:         String(row[13]||''),
          account:      String(row[14]||''),
          account_name: String(row[15]||''),
          transfer_amt: toNum(row[16]),
          email:        String(row[17]||''),
          resident_no:  String(row[18]||''),
          special_emp:  toNum(row[19]),
          industrial:   toNum(row[20]),
          income_tax:   toNum(row[21]),
          resident_tax: toNum(row[22]),
          other_deduct: toNum(row[23]),
          total_deduct: toNum(row[24]),
          monthly_report: toNum(row[25]),
          memo:         String(row[26]||''),
          hq_note:      String(row[27]||''),
          sent: false
        });
      }

      setTimeout(() => {
        document.getElementById('uploadProgress').style.display = 'none';
        // show meta
        document.getElementById('metaBox').style.display = 'block';
        document.getElementById('metaDate').textContent = fileMeta.payDate || '-';
        document.getElementById('metaPeriod').textContent = fileMeta.classPeriod || '-';
        document.getElementById('metaType').textContent = fileMeta.instrType || '-';
        document.getElementById('metaCount').textContent = employees.length + '명';
        renderList();
        if (employees.length) selectEmp(employees[0]);
        showToast(`✓ ${employees.length}명 데이터 로드 완료`, 'success');
        document.getElementById('sendAllBtn').disabled = false;
      }, 700);
    } catch(err) {
      console.error(err);
      document.getElementById('uploadProgress').style.display = 'none';
      showToast('파일 형식을 확인해주세요', 'error');
    }
  };
  r.readAsBinaryString(file);
}

function animProg() {
  let v = 0; const el = document.getElementById('pf');
  const iv = setInterval(() => { v = Math.min(v + Math.random()*22, 90); el.style.width = v+'%'; if(v>=90) clearInterval(iv); }, 90);
}

function renderList() {
  const list = document.getElementById('empList');
  document.getElementById('empCount').textContent = `(${employees.length}명)`;
  if (!employees.length) { list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px 0">데이터 없음</div>'; return; }
  list.innerHTML = employees.map((e,i) => `
    <div class="emp-item ${currentEmp===e?'active':''}" onclick="selectEmp(employees[${i}])">
      <div class="emp-avatar">${e.name[0]||'?'}</div>
      <div class="emp-info">
        <p>${e.name} ${e.sent?'✅':''}</p>
        <span>${e.subject} · ${e.school}</span>
      </div>
    </div>`).join('');
}

function selectEmp(emp) { currentEmp = emp; renderList(); renderSlip(emp); }

function openEmailModal() {
  if (!currentEmp) return;
  const e = currentEmp;
  document.getElementById('emailTo').value = e.email || '';
  document.getElementById('emailName').value = e.name || '';
  document.getElementById('emailSubject').value = `[주식회사 아이야] ${fileMeta.payDate||''} 수수료 지급명세서 - ${e.name} 강사님`;
  document.getElementById('emailBody').value =
    `안녕하세요, ${e.name} 강사님.\n\n주식회사 아이야 수수료 지급명세서를 전달드립니다.\n\n지급일: ${fileMeta.payDate||''}\n수업기간: ${fileMeta.classPeriod||''}\n과목: ${e.subject}\n실지급액: ${fmt(e.net_pay)}\n\n문의사항이 있으시면 담당자에게 연락해 주세요.\n감사합니다.\n\n주식회사 아이야`;
  document.getElementById('emailModal').classList.add('open');
}

function closeModal() { document.getElementById('emailModal').classList.remove('open'); }
function sendEmail() {
  const to      = document.getElementById('emailTo').value.trim();
  const name    = document.getElementById('emailName').value.trim();
  const subject = document.getElementById('emailSubject').value.trim();
  const body    = document.getElementById('emailBody').value.trim();

  if (!to) { showToast('이메일 주소를 입력해주세요', 'error'); return; }

  const sendBtn = document.querySelector('#emailModal .btn-green');
  sendBtn.disabled = true;
  sendBtn.textContent = '전송 중...';

  const params = {
    to_email: to,
    to_name:  name,
    subject:  subject,
    message:  body,
    from_name: '주식회사 아이야',
  };

  fetch('https://api.emailjs.com/api/v1/email/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      service_id:  EMAILJS_SERVICE,
      template_id: EMAILJS_TEMPLATE,
      user_id:     EMAILJS_PUBLIC_KEY,
      template_params: params
    })
  })
  .then(res => {
    if (res.ok) {
      closeModal();
      if (currentEmp) { currentEmp.sent = true; renderList(); }
      showToast(`✓ ${to} 전송 완료!`, 'success');
    } else {
      return res.text().then(t => { throw new Error(t); });
    }
  })
  .catch(err => {
    console.error('EmailJS 오류:', err);
    showToast(`전송 실패: ${err.message || '설정을 확인해주세요'}`, 'error');
  })
  .finally(() => {
    sendBtn.disabled = false;
    sendBtn.textContent = '✉ 전송';
  });
}
async function sendAll() {
  if (!employees.length) return;
  const btn = document.getElementById('sendAllBtn');
  btn.disabled = true;
  btn.textContent = '전송 중...';
  let ok = 0, fail = 0;

  for (const e of employees) {
    if (!e.email) { fail++; continue; }
    try {
      const res = await fetch('https://api.emailjs.com/api/v1/email/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          service_id:  EMAILJS_SERVICE,
          template_id: EMAILJS_TEMPLATE,
          user_id:     EMAILJS_PUBLIC_KEY,
          template_params: {
            to_email:  e.email,
            to_name:   e.name,
            subject:   `[주식회사 아이야] ${fileMeta.payDate||''} 수수료 지급명세서 - ${e.name} 강사님`,
            message:   `안녕하세요, ${e.name} 강사님.\n\n주식회사 아이야 수수료 지급명세서를 전달드립니다.\n\n지급일: ${fileMeta.payDate||''}\n수업기간: ${fileMeta.classPeriod||''}\n과목: ${e.subject}\n실지급액: ${fmt(e.net_pay)}\n\n문의사항이 있으시면 담당자에게 연락해 주세요.\n감사합니다.\n\n주식회사 아이야`,
            from_name: '주식회사 아이야',
          }
        })
      });
      if (res.ok) { e.sent = true; ok++; }
      else { fail++; }
      } catch(err) { fail++; }
    renderList();
    // 연속 전송 간격 (스팸 방지)
    await new Promise(r => setTimeout(r, 300));
  }

  btn.disabled = false;
  btn.textContent = '✉ 전체 일괄 이메일 전송';
  showToast(`✓ 전송완료 ${ok}명 ${fail ? '| 실패 '+fail+'명' : ''}`, ok > 0 ? 'success' : 'error');
}
function downloadPDF() {
  const s = document.createElement('style'); s.textContent = '@page{size:A4;margin:15mm;}';
  document.head.appendChild(s); window.print(); setTimeout(()=>document.head.removeChild(s), 1000);
}
function showToast(msg, type='success') {
  const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3200);
}
document.getElementById('emailModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
</script>
